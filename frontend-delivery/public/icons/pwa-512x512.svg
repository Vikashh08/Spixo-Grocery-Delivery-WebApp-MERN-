<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Spixo Delivery Orange Gradient -->
    <linearGradient id="deliveryBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fca311;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow Effect -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="12" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- PWA Main Rounded Base -->
  <rect width="512" height="512" rx="100" fill="url(#deliveryBgGrad)" />

  <!-- Glass Layer (Frosted Orange tint) -->
  <rect x="80" y="80" width="352" height="352" rx="60" fill="white" fill-opacity="0.2" stroke="white" stroke-opacity="0.4" stroke-width="2" filter="url(#shadow)" />
  
  <!-- Rider/Scooter Silhouette Over glass -->
  <g transform="translate(144, 144) scale(0.45)" fill="white">
     <!-- Scooter Wheel style shapes -->
     <circle cx="100" cy="400" r="40" stroke="white" stroke-width="32" fill="none" />
     <circle cx="412" cy="400" r="40" stroke="white" stroke-width="32" fill="none" />
     <!-- Delivery Box Silhouette -->
     <rect x="30" y="150" width="120" height="120" rx="20" fill="white" opacity="0.95" />
     <!-- Minimalist Rider Symbol -->
     <path d="M150 250 L350 250 L400 380 H100 Z" fill="white" opacity="0.8" />
     <circle cx="280" cy="180" r="40" fill="white" />
  </g>

  <!-- High Gloss highlight -->
  <path d="M100 80 Q256 60 412 80" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="40" stroke-linecap="round" />
</svg>
