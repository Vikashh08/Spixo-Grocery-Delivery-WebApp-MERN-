<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Spixo Vibrant Green Background Gradient -->
    <linearGradient id="userBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2cce7d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glass Filter -->
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" />
    </filter>
    
    <!-- Soft Shadow -->
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="12" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- PWA Main Rounded Base -->
  <rect width="512" height="512" rx="100" fill="url(#userBgGrad)" />

  <!-- Glass Layer (Frosted White) -->
  <rect x="90" y="90" width="332" height="332" rx="60" fill="white" fill-opacity="0.25" stroke="white" stroke-opacity="0.5" stroke-width="2" filter="url(#shadow)" />
  
  <!-- Spixo Grocery Bag Silhouette -->
  <g transform="translate(144, 134) scale(0.48)" fill="white">
     <path d="M256 32 L40 240 H96 V448 H416 V240 H472 L256 32 Z" opacity="0.95" />
     <!-- Leaf on the Bag handle style -->
     <path d="M120 40 Q256 0 392 40" fill="none" stroke="white" stroke-width="32" stroke-linecap="round" />
  </g>

  <!-- Glossy Reflection at Top -->
  <ellipse cx="256" cy="110" rx="200" ry="40" fill="white" fill-opacity="0.1" />
</svg>
